api:
  host: 0.0.0.0
  puerto: 8000
  version: v1
datos:
  fuente: sklearn.datasets.fetch_california_housing
  proporcion_test: 0.2
  ruta_procesada: data/processed/housing_procesado.csv
  ruta_raw: data/raw/housing_raw.csv
  ruta_test: data/processed/test.csv
  ruta_train: data/processed/train.csv
  semilla: 42
  variable_objetivo: MedHouseVal
experimentos:
  nombre_experimento: precio-viviendas
  ruta: experiments/
features:
  eliminar_outliers: true
  escalar: true
  metodo_escalado: standard
  numericas:
  - MedInc
  - HouseAge
  - AveRooms
  - AveBedrms
  - Population
  - AveOccup
  - Latitude
  - Longitude
  umbral_outliers: 3.0
modelo:
  algoritmo: gradient_boosting
  hiperparametros:
    gradient_boosting:
      learning_rate: 0.1205712628744377
      max_depth: 8
      min_samples_split: 4
      n_estimators: 250
      random_state: 42
      subsample: 0.7993292420985183
    linear_regression:
      fit_intercept: true
    random_forest:
      max_depth: 10
      min_samples_split: 5
      n_estimators: 100
      random_state: 42
  ruta_modelo: experiments/modelo_produccion.pkl
  ruta_scaler: experiments/scaler.pkl
monitoreo:
  umbral_degradacion_rmse: 0.1
  umbral_drift_psi: 0.2
  ventana_evaluacion_dias: 7
objetivo:
  descripcion: Estimar el precio de vivienda para apoyar decisiones de inversión
  metrica_principal: rmse
  umbral_aprobacion:
    r2: 0.8
    rmse: 0.5
proyecto:
  autor: Equipo MLOps
  descripcion: Predecir el precio mediano de viviendas en California
  nombre: prediccion-precio-viviendas
  tipo_problema: regresion
  version: 1.0.0

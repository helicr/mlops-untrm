# ============================================================
# CI/CD Pipeline — MLOps: Ciclo de Vida del Modelo
# ============================================================
#
# FLUJO:
#   push a develop     → CI: tests + calidad de código
#   PR develop→master  → CI + entrenamiento + evaluación del modelo
#   push a master      → CI + entrenamiento + evaluación + Docker build/push
#
# El modelo SOLO llega a producción si:
#   1. Los tests pasan
#   2. El modelo supera los umbrales (RMSE < 0.5, R² > 0.80)
#   3. El merge a master fue aprobado
# ============================================================

name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - master
  schedule:
    # Re-entrenar semanalmente los lunes a las 2am UTC
    - cron: "0 2 * * 1"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mlops-api-viviendas
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: CI — Tests y calidad de código
  # Se ejecuta en: push a develop, push a master, PR a master
  # ─────────────────────────────────────────────────────────
  ci:
    name: "CI — Tests y Calidad"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests
        run: pytest tests/ -v --tb=short

      - name: Verificar calidad de código
        run: |
          pip install flake8
          flake8 src/ --max-line-length=100 --ignore=E501,W503

  # ─────────────────────────────────────────────────────────
  # JOB 2: Entrenamiento y Evaluación del Modelo
  # Se ejecuta en: push a master, PR a master, schedule
  # NO se ejecuta en push a develop (solo CI)
  # ─────────────────────────────────────────────────────────
  entrenar-evaluar:
    name: "ML — Entrenamiento y Evaluación"
    runs-on: ubuntu-latest
    needs: ci
    if: |
      github.ref == 'refs/heads/master' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: "Etapa 2 — Preparar datos"
        run: python src/data/preparar_datos.py

      - name: "Etapa 3 — Ingeniería de features"
        run: python src/features/ingenieria_features.py

      - name: "Etapa 4 — Entrenar modelo"
        run: python src/models/entrenar.py

      - name: "Etapa 5 — Evaluar modelo (gate de calidad)"
        run: python src/models/evaluar.py
        # Si el modelo no supera RMSE < 0.5 y R² > 0.80 → falla aquí
        # y el despliegue NO ocurre

      - name: Mostrar reporte de evaluación
        run: cat experiments/reporte_evaluacion.json

      - name: Guardar modelo como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: modelo-produccion-${{ github.sha }}
          path: |
            experiments/modelo_produccion.pkl
            experiments/scaler.pkl
            experiments/reporte_evaluacion.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # JOB 3: Build y Push de imagen Docker
  # Se ejecuta en: push a master ÚNICAMENTE
  # Toma el modelo entrenado en el job anterior y lo empaqueta
  # ─────────────────────────────────────────────────────────
  despliegue:
    name: "CD — Build y Push Docker"
    runs-on: ubuntu-latest
    needs: entrenar-evaluar
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write  # Necesario para push a ghcr.io

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar modelo aprobado
        uses: actions/download-artifact@v4
        with:
          name: modelo-produccion-${{ github.sha }}
          path: experiments/

      - name: Verificar modelo descargado
        run: |
          echo "Modelo listo para empaquetar:"
          ls -lh experiments/
          echo "Reporte de evaluación:"
          cat experiments/reporte_evaluacion.json

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Resumen del despliegue
        run: |
          echo "================================================"
          echo "  MODELO DESPLEGADO EN PRODUCCION"
          echo "================================================"
          echo "  Imagen: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "  Commit: ${{ github.sha }}"
          echo "  Rama:   ${{ github.ref_name }}"
          echo "  Fecha:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "  Para ejecutar localmente:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "  docker run -p 8000:8000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "================================================"

# ============================================================
# Docker Compose — MLOps: API de Predicción de Viviendas
# ============================================================
# Uso:
#   docker compose up --build      # Construir y levantar
#   docker compose up -d           # En background
#   docker compose down            # Bajar
#   docker compose logs -f api     # Ver logs en tiempo real

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-api-viviendas
    ports:
      - "8000:8000"
    volumes:
      # El modelo y scaler se montan desde el host
      # Así se puede actualizar el modelo sin reconstruir la imagen
      - ./experiments:/app/experiments
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
